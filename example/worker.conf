[[mirrors]]
name = "mainsail-release"
provider = "command"
upstream = ""
command = "/path-venv/python3 /path/mmt/sync-webui-release.py --workers 5 --config /path/mainsail-mirror.json"
size_pattern = "Total size is ([0-9\\.]+[KMGTP]?)"
interval = 720

