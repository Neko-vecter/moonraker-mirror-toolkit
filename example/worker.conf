[[mirrors]]
name = "klipper.git"
provider = "command"
command = "/path/mmt/git-repo.sh -b master"
upstream = "https://github.com/Klipper3d/klipper.git"
size_pattern = "Total size is ([0-9.]+[KMGTP]?)"
interval = 720

